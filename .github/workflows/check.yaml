name: "🧪 Check"

on:
  push:
    branches:
      - "main"
    tags-ignore:
      - '**'
    paths-ignore:
      - ".dockerignore"
      - ".github/workflows/code-review.yaml"
      - ".gitignore"
      - ".goreleaser.yaml"
      - "README.md"
      - "renovate.json"
      - "rustfmt.toml"
  pull_request:
    branches:
      - "main"

env:
  CARGO_TERM_COLOR: "always"
  RUSTC_WRAPPER: "sccache"
  SCCACHE_GHA_ENABLED: "true"
  DEBIAN_FRONTEND: "noninteractive"

jobs:
  check:
    name: "🧪 Check"
    runs-on: "ubuntu-24.04-arm"
    concurrency:
      group: "${{ github.ref }}"
      cancel-in-progress: true

    steps:
      - name: "⬆️ Set up stable Rust"
        uses: "dtolnay/rust-toolchain@stable"
        with:
          components: "clippy"

      - name: "⬆️ Set up nightly Rust"
        uses: "dtolnay/rust-toolchain@nightly"
        with:
          components: "llvm-tools-preview"

      - name: "📥 Checkout"
        uses: "actions/checkout@v7"

      - name: "⚡️ Rust Cache"
        uses: "Swatinem/rust-cache@v2"
        with:
          cache-on-failure: true

      - name: "⚡️ Shared Compilation Cache"
        uses: "mozilla-actions/sccache-action@v0.0.10"
        with:
          version: "v0.14.0"

      - name: "🧪 Install coverage tools"
        uses: "taiki-e/install-action@cargo-llvm-cov"

      - name: "🧪 Test"
        run: "cargo +nightly llvm-cov --codecov --doctests --output-path=codecov.json --workspace -- --include-ignored"
        env:
          TZ: "Europe/Amsterdam"

      - name: "📝 Docs"
        run: "cargo doc --no-deps --lib"
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: "📤 Upload coverage"
        uses: "codecov/codecov-action@v7"
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          slug: "eigenein/fennec"
          files: "codecov.json"

      - name: 💬 Clippy
        uses: giraffate/clippy-action@v1
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          clippy_flags: "--workspace --all-targets"
          reporter: "github-check"
        continue-on-error: true
