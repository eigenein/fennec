name: "🧪 Check"

on:
  push:
    branches:
      - "main"
    tags-ignore:
      - '**'
    paths-ignore:
      - ".dockerignore"
      - ".github/workflows/code-review.yaml"
      - ".gitignore"
      - ".goreleaser.yaml"
      - "README.md"
      - "renovate.json"
      - "rustfmt.toml"
  pull_request:
    types:
      - "opened"
      - "reopened"
      - "synchronize"
    branches:
      - "main"

env:
  CARGO_TERM_COLOR: "always"
  RUSTC_WRAPPER: "sccache"
  SCCACHE_GHA_ENABLED: "true"
  DEBIAN_FRONTEND: "noninteractive"

jobs:
  check:
    name: "🧪 Check"
    runs-on: "macos-latest"
    concurrency:
      group: "${{ github.ref }}"
      cancel-in-progress: true

    steps:
      - name: "⬆️ Set up stable Rust"
        uses: "dtolnay/rust-toolchain@stable"
        with:
          components: "clippy"

      - name: "⬆️ Set up nightly Rust"
        uses: "dtolnay/rust-toolchain@nightly"
        with:
          components: "llvm-tools-preview"

      - name: "📥 Checkout"
        uses: "actions/checkout@v7"

      - name: "⚡️ Rust Cache"
        uses: "Swatinem/rust-cache@v2"
        with:
          cache-on-failure: true

      - name: "⚡️ Shared Compilation Cache"
        uses: "mozilla-actions/sccache-action@v0.0.10"

      - name: "🧪 Install coverage tools"
        uses: "taiki-e/install-action@cargo-llvm-cov"

      - name: "🧪 Test"
        run: "cargo +nightly llvm-cov --codecov --doctests --output-path=codecov.json --workspace -- --include-ignored"
        env:
          TZ: "Europe/Amsterdam"

      - name: "📝 Docs"
        run: |
          cargo +nightly rustdoc -p fennec-modbus --all-features -- -Z unstable-options --check
          cargo +nightly rustdoc -p fennec-cli --all-targets --all-features -- -Z unstable-options --check

      - name: "📤 Upload coverage"
        uses: "codecov/codecov-action@v7"
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          slug: "eigenein/fennec"
          files: "codecov.json"

      - name: "💬 Clippy"
        uses: "giraffate/clippy-action@v1"
        with:
          github_token: "${{ secrets.GITHUB_TOKEN }}"
          clippy_flags: "--workspace --all-targets"
          reporter: "github-check"
        continue-on-error: true

  review:
    if: "github.event_name == 'pull_request'"
    name: "🧙 Code review"
    runs-on: "ubuntu-slim"
    needs: "check"
    permissions:
      actions: "read"
      contents: "read"
      pull-requests: "write"
      issues: "write"
      id-token: "write"
    steps:
      - name: "📥 Checkout"
        uses: "actions/checkout@v7"
        with:
          fetch-depth: 1

      - uses: "anthropics/claude-code-action@v1"
        name: "🧙 Claude"
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          claude_args: "--model claude-haiku-4-5"
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
