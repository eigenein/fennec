name: "🧙 Code review"
on:
  pull_request:
    types: ["opened", "synchronize"]
jobs:
  review:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      pull-requests: "write"
      issues: "write"
      id-token: "write"
    steps:
      - name: "📥 Checkout"
        uses: "actions/checkout@v6"
        with:
          fetch-depth: 1

      - uses: "anthropics/claude-code-action@v1"
        name: "🧙 Claude"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: "/review"
